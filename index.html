<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Beverages | Royal Catalog</title>
    <meta name="description" content="Royal Beverages - Alexandria's premium purveyor of fine wines, select beers, and luxury spirits since 1923.">
    <meta property="og:title" content="Royal Beverages | Fine Wines & Select Beers">
    <meta property="og:description" content="Royal Beverages - Alexandria's premium purveyor of fine wines, select beers, and luxury spirits since 1923.">
    <meta property="og:image" content="https://rasenrengan.github.io/beverage-catalog/images/logo.png">
    <meta property="og:url" content="https://rasenrengan.github.io/beverage-catalog/">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LiquorStore",
      "name": "Royal Beverages",
      "image": "https://rasenrengan.github.io/beverage-catalog/images/logo.png",
      "@id": "https://rasenrengan.github.io/beverage-catalog/",
      "url": "https://rasenrengan.github.io/beverage-catalog/",
      "telephone": "+20 123 456 7890",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Alexandria",
        "addressCountry": "EG"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": 31.253467,
        "longitude": 29.974973
      },
      "openingHoursSpecification": [
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"],
          "opens": "12:00",
          "closes": "04:00"
        }
      ]
    }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="global-banner">
        <img src="images/banner.png" alt="Royal Banner">
    </div>
    <header class="navbar">
        <div class="logo"><a href="index.html"><img src="images/logo.png" alt="Royal Logo"></a></div>
        <nav>
            <a href="index.html" class="active">Home</a>
            <a href="catalog.html">Catalog</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </nav>
        <div class="nav-search">
            <input type="text" id="global-search-input" placeholder="Search products...">
            <button id="global-search-btn">🔍</button>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="hero-slideshow">
                <div class="slide slide-1"></div>
                <div class="slide slide-2"></div>
                <div class="slide slide-3"></div>
            </div>
            <div class="hero-content">
                <h1>Taste the <span>Excellence</span></h1>
                <p>Explore our curated collection of premium wines, spirits, and beers from around the world.</p>
                <a href="catalog.html" class="btn-primary">View Catalog</a>
            </div>
        </section>

        <section class="featured-categories">
            <h2>Our Categories</h2>
            <div class="category-grid">
                <a href="catalog.html?category=Wine" class="category-card">
                    <img src="images/wine/red/Chateau de Grandville Red Wine 750ml.png" alt="Wine">
                    <h3>Premium Wines</h3>
                </a>
                <a href="catalog.html?category=Spirits" class="category-card">
                    <img src="images/spirit/Whiskey/Auld Stag Whisky 750 ml.png" alt="Spirits">
                    <h3>Luxury Spirits</h3>
                </a>
                <a href="catalog.html?category=Beer" class="category-card">
                    <img src="images/Beers/Stella 330ml Bottle.png" alt="Beer">
                    <h3>Craft Beers</h3>
                </a>
            </div>
        </section>
        <section class="store-map" style="text-align: center; padding: 40px 5%;">
            <h2>Visit Our Store</h2>
            <div class="map-container" style="margin-top: 20px; border-radius: 15px; overflow: hidden; display: inline-block; max-width: 100%;">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3410.817789523098!2d29.974973576268635!3d31.253467074337383!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x14f5daca7acd63cd%3A0xd421b89ae57f11f0!2sRoyal!5e0!3m2!1sen!2seg!4v1779259730750!5m2!1sen!2seg" width="100%" height="450" style="border:0; max-width: 800px; width: 100vw;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Royal. All rights reserved. Not for online sale.</p>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
