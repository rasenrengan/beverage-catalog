<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Beverages | Catalog</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">BEVERAGE<span>CO</span></div>
        <nav>
            <a href="index.html" class="active">Home</a>
            <a href="catalog.html">Catalog</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="hero-content">
                <h1>Taste the <span>Excellence</span></h1>
                <p>Explore our curated collection of premium wines, spirits, and beers from around the world.</p>
                <a href="catalog.html" class="btn-primary">View Catalog</a>
            </div>
        </section>

        <section class="featured-categories">
            <h2>Our Categories</h2>
            <div class="category-grid">
                <a href="catalog.html?category=Wine" class="category-card">
                    <img src="images/premium_wine_bottle.png" alt="Wine">
                    <h3>Premium Wines</h3>
                </a>
                <a href="catalog.html?category=Spirits" class="category-card">
                    <img src="images/premium_spirit_bottle.png" alt="Spirits">
                    <h3>Luxury Spirits</h3>
                </a>
                <a href="catalog.html?category=Beer" class="category-card">
                    <img src="images/premium_beer_bottle.png" alt="Beer">
                    <h3>Craft Beers</h3>
                </a>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Beverage Co. All rights reserved. Not for online sale.</p>
    </footer>
</body>
</html>
