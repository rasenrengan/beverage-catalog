<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalog | Royal Beverages</title>
    <meta name="description" content="Royal Beverages - Browse our complete catalog of premium wines, select beers, and luxury spirits.">
    <meta property="og:title" content="Catalog | Royal Beverages">
    <meta property="og:description" content="Browse our complete catalog of premium wines, select beers, and luxury spirits.">
    <meta property="og:image" content="https://rasenrengan.github.io/beverage-catalog/images/logo.png">
    <meta property="og:url" content="https://rasenrengan.github.io/beverage-catalog/catalog.html">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LiquorStore",
      "name": "Royal Beverages",
      "image": "https://rasenrengan.github.io/beverage-catalog/images/logo.png",
      "@id": "https://rasenrengan.github.io/beverage-catalog/",
      "url": "https://rasenrengan.github.io/beverage-catalog/",
      "telephone": "+20 123 456 7890",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Alexandria",
        "addressCountry": "EG"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": 31.253467,
        "longitude": 29.974973
      },
      "openingHoursSpecification": [
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"],
          "opens": "12:00",
          "closes": "04:00"
        }
      ]
    }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="global-banner">
        <img src="images/banner.png" alt="Royal Banner">
    </div>
    <header class="navbar">
        <div class="logo"><a href="index.html"><img src="images/logo.png" alt="Royal Logo"></a></div>
        <nav>
            <a href="index.html">Home</a>
            <a href="catalog.html" class="active">Catalog</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </nav>
        <div class="nav-search">
            <input type="text" id="global-search-input" placeholder="Search products...">
            <button id="global-search-btn">🔍</button>
        </div>
    </header>

    <main class="catalog-page">
        <div class="catalog-header">
            <h1>Our Catalog</h1>
            <p>Browse our selection and prices. *For preview only, no online sales.*</p>
        </div>

        <div class="catalog-container">
            <aside class="sidebar">
                <h3>Categories</h3>
                <ul id="category-filters">
                    <li class="active" data-category="All">All Products</li>
                    <li data-category="Wine">Wine</li>
                    <li data-category="Spirits">Spirits</li>
                    <li data-category="Beer">Beer</li>
                    <li data-category="RTDs">RTDs</li>
                    <li data-category="Accessories">Accessories</li>
                    <li data-category="Extras">Extras</li>
                </ul>
            </aside>

            <section class="products">
                <div class="products-grid" id="products-grid">
                    <!-- Products will be injected here by JS -->
                </div>
            </section>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Royal. All rights reserved. Not for online sale.</p>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
